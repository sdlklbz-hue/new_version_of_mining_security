[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "mining_risk_common"
version = "1.0.0"
description = "工矿风险智能体 — 共享数据平面、模型核心与配置"
requires-python = ">=3.10"
dependencies = [
    "pydantic>=2.0.0",
    "pyyaml>=6.0.1",
    "python-dotenv>=1.0.0",
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
    "scipy>=1.10.0",
    "joblib>=1.3.0",
    "openpyxl>=3.1.0",
    "python-json-logger>=2.0.7",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["mining_risk_common*"]
