# =============================================================================
# 工矿企业风险预警智能体 — 一键部署
# - api:      FastAPI 后端（Python 3.10 + Uvicorn）
# - frontend: React SPA（Vite 构建）+ Nginx 反向代理
# =============================================================================

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: ${API_REQUIREMENTS_FILE:-requirements-deploy.txt}
    image: mining-risk-agent-api:latest
    container_name: mining_risk_api
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
      - ./knowledge_base:/app/knowledge_base
      - ./memory:/app/memory
      - ./new_data:/app/new_data
      - ./api:/app/api
      - ./utils:/app/utils
      - ./config.yaml:/app/config.yaml
    environment:
      PYTHONPATH: /app
      PYTHONUNBUFFERED: "1"
      # LLM / OpenAI 兼容 SDK 凭证（如需）。
      # 任意自定义 provider 可通过通用 LLM_* 覆盖，或在 config.yaml 中配置 api_key_env 后透传对应变量。
      LLM_PROVIDER: ${LLM_PROVIDER:-glm5}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      GLM5_API_KEY: ${GLM5_API_KEY:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      # 管理接口保护与演示降级开关。
      MRA_ADMIN_TOKEN: ${MRA_ADMIN_TOKEN:-}
      MRA_ALLOW_UNAUTHENTICATED_ADMIN: ${MRA_ALLOW_UNAUTHENTICATED_ADMIN:-}
      MRA_ENABLE_MOCK_FALLBACK: ${MRA_ENABLE_MOCK_FALLBACK:-true}
      MRA_CORS_ORIGINS: ${MRA_CORS_ORIGINS:-http://localhost:8501,http://127.0.0.1:8501,http://localhost:5173,http://127.0.0.1:5173}
      # 限制 native ML/RAG 依赖的线程池，降低 tokenizer/BLAS/OpenMP 组合崩溃风险。
      TOKENIZERS_PARALLELISM: "false"
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
      MKL_NUM_THREADS: "1"
      NUMEXPR_NUM_THREADS: "1"
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - mra_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: mining-risk-agent-frontend:latest
    container_name: mining_risk_frontend
    ports:
      # 浏览器访问 http://localhost:8501
      # 容器内 Nginx 监听 80
      - "8501:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - mra_net

networks:
  mra_net:
    driver: bridge
