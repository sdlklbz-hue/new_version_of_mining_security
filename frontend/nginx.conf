# =============================================================================
# 前端 Nginx 配置
# - 静态托管 React SPA（含 history fallback）
# - 反向代理 /api/  /health  /docs  /redoc  /openapi.json 至后端服务
# - 关闭 SSE 缓冲，保证 /api/v1/agent/decision/stream 流式输出
# =============================================================================

upstream backend_api {
    # 默认指向 docker-compose 中的 api 服务
    # 可通过构建/运行时替换 nginx.conf 修改 host:port
    server api:8000;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 100m;

    # 静态资源 gzip
    gzip on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    # SPA history fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 反向代理
    location /api/ {
        proxy_pass http://backend_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;
        client_max_body_size 100m;
        proxy_request_buffering off;
        # SSE：关闭代理缓冲与压缩，保证按行下发
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        chunked_transfer_encoding on;
    }

    location = /health {
        proxy_pass http://backend_api/health;
        proxy_set_header Host $host;
    }

    location /docs {
        proxy_pass http://backend_api/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend_api/redoc;
        proxy_set_header Host $host;
    }

    location = /openapi.json {
        proxy_pass http://backend_api/openapi.json;
        proxy_set_header Host $host;
    }

    # 静态资源缓存
    location ~* \.(?:js|css|woff2?|ttf|eot|otf|svg|png|jpg|jpeg|gif|ico)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }
}
