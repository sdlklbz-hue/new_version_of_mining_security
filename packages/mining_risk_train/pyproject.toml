[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "mining_risk_train"
version = "1.0.0"
description = "工矿风险智能体 — 模型训练与迭代流水线"
requires-python = ">=3.10"
dependencies = [
    "mining_risk_common",
    "matplotlib>=3.7.0",
    "seaborn>=0.12.0",
]

[project.optional-dependencies]
ml = [
    "xgboost>=2.0.0",
    "lightgbm>=4.0.0",
    "catboost>=1.2.0",
    "tensorflow>=2.13.0",
    "keras>=2.13.0",
    "shap>=0.42.0",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["mining_risk_train*"]
