# 工矿企业风险预警智能体系统配置
# Mining Risk Warning Agent System Configuration

project:
  name: "mining_risk_agent"
  version: "1.0.0"
  debug: false

# 数据配置
data:
  raw_data_path: "../公开数据/数据补充"
  reference_data_path: "../公开数据/数据参考"
  merged_data_path: "../公开数据/new_已清洗.csv"  # 预合并训练集（80016行×215列）
  supported_formats: ["csv", "xlsx", "json"]
  encoding: "utf-8-sig"
  batch_size: 1000

  # 各原始表的主键/外键映射（用于 merge_enterprise_tables）
  table_join_keys:
    szs_enterprise_information:
      primary_key: "主键ID"
      report_key: "报告历史id"
    szs_enterprise_risk_history:
      primary_key: "主键ID"
      enterprise_key: "企业ID"
    szs_enterprise_risk:
      report_key: "报告历史ID"
    szs_enterprise_safety:
      report_key: "报告历史ID"
    st_enterprise_directory:
      credit_code_key: "社会统一信用代码 主键"
    szs_enterprise_dust_clear_record:
      credit_code_key: "统一信用代码"

# 特征工程配置（对齐 new_已清洗.csv 的实际列名）
features:
  # 目标列
  target_column: "new_level"          # A/B/C/D 四级风险

  # 主键字段（不参与特征）
  id_columns:
    - "enterprise_id"
    - "enterprise_name"
    - "latest_risk_report_id"
    - "Unnamed: 0"

  # 二值型字段
  binary_columns:
    - "above_designated"              # 是否规上企业
    - "if_insure"                     # 是否投保
    - "if_comply_formality"           # 是否履行三同时手续
    # if_certificate 在当前训练集中 100% 缺失，暂不纳入训练特征
    - "factory_in_factory"            # 厂中厂
    - "has_risk_item"                 # 有风险项
    - "is_explosive_dust"             # 爆炸性粉尘企业
    - "is_ammonia_refrigerating"      # 氨制冷企业
    - "is_finite_space"               # 有限空间企业
    - "is_major_hazards"              # 重大危险源
    - "is_metal_smelter"              # 金属冶炼企业
    - "is_gas_company"                # 燃气企业
    - "confined_spaces_enterprise"    # 有限空间作业企业
    - "dangerous_chemical_enterprise" # 危化品企业
    - "risk_accident_flag"            # 曾发生事故
    - "risk_company_flag"             # 风险重点企业
    - "risk_company_key_flag"         # 关键风险企业
    - "if_valid"                      # 数据有效标识

  # 数值型字段
  numeric_columns:
    - "staff_num"                     # 企业职工总人数
    - "safety_num"                    # 安全管理人员数量
    - "fulltime_safety_num"           # 专职安全管理人员数
    - "parttime_safety_num"           # 兼职安全管理人员数
    - "safety_dept_num"               # 部门安全管理人员数量
    - "fulltime_cert_num"             # 专职安全管理人持证员数
    - "parttime_cert_num"             # 兼职安全管理人持证员数
    - "special_work_cert_num"         # 特种作业持证人数
    # safety_invest 在当前训练集中 100% 缺失，暂不纳入训练特征
    - "last_year_income"              # 上一年经营收入
    - "fixed_assets"                  # 固定资产
    - "insure_money"                  # 投保金额
    - "injury_insurance"              # 工伤保险支出（万元）
    - "insure_num"                    # 投保人数
    - "last_year_turnover"            # 上一年人员流动率
    - "risk_total_count"              # 总风险数
    - "risk_level_a_count"            # A级风险数
    - "risk_level_b_count"            # B级风险数
    - "risk_level_c_count"            # C级风险数
    - "risk_level_d_count"            # D级风险数
    - "risk_with_accident_count"      # 曾发事故的风险数
    - "check_total_count"             # 检查总次数
    - "check_trouble_count"           # 检查发现问题次数
    - "trouble_total_count"           # 隐患总数
    - "trouble_level_1_count"         # 一般隐患数
    - "trouble_level_2_count"         # 重大隐患数
    - "trouble_unrectified_count"     # 未整改隐患数
    - "writ_total_count"              # 文书总数
    - "writ_from_case_count"          # 立案文书数
    - "writ_from_check_count"         # 检查文书数
    - "total_penalty_money"           # 处罚金额
    - "dust_ganshi_num"               # 干式除尘系统数量
    - "dust_shishi_num"               # 湿式除尘系统数量
    - "gaolu_num"                     # 高炉数量
    - "zhuanlu_num"                   # 转炉数量
    - "dianlu_num"                    # 电炉数量
    - "dust_clear_count"              # 除尘作业次数

  # 枚举型字段
  enum_columns:
    - "supervision_large"             # 行业监管大类
    - "safety_build"                  # 安全生产标准化建设情况
    - "rh_production_status"          # 生产状态
    - "business_status"               # 经营状态

  # 文本型字段（预合并数据中文本已聚合为数值，此节留空）
  text_columns: []

  # 行业分类字段
  industry_columns:
    - "indus_type_class"              # 国民经济门类
    - "indus_type_large"              # 国民经济大类
    - "indus_type_middle"             # 国民经济中类
    - "indus_type_small"              # 国民经济小类
    - "supervision_large"             # 行业监管大类

  # 特殊逻辑特征列（明确指定，消除模糊探测）
  special_features:
    dust_removal:
      dry_col: "dust_ganshi_num"
      wet_col: "dust_shishi_num"
    confined_space_cols:
      - "is_finite_space"
      - "confined_spaces_enterprise"
      - "risk_finite_key_flag"
    hazardous_chemical_cols:
      - "dangerous_chemical_enterprise"
      - "is_ammonia_refrigerating"
      - "risk_whp_flag"
      - "risk_whp_use_flag"
    time_col: "report_time"
    # report_time 缺失时按高风险信号处理，避免误判为“历史旧数据”
    time_decay_missing_weight: 1.0
    time_decay_value_cols:
      - "trouble_total_count"
      - "risk_total_count"
      - "check_total_count"
    geo_fence:
      lon_col: "dir_longitude"
      lat_col: "dir_latitude"
    enterprise_id_col: "enterprise_id"
    hazard_cols:
      - "trouble_total_count"
      - "trouble_level_2_count"
      - "risk_with_accident_count"
    document_cols:
      - "writ_total_count"
      - "writ_from_case_count"
      - "writ_from_check_count"

  # 缺失值处理策略
  missing_value_strategy:
    management_fields:
      strategy: "high_score"
      fields:
        - "safety_build"
        - "if_comply_formality"
    objective_fields:
      strategy: "mean_imputation"
      fields:
        - "last_year_turnover"
        - "last_year_income"

  # 极端值截断阈值（分位数）
  outlier_clip_quantile: 0.99

# 模型配置
model:
  stacking:
    # 基学习器配置
    base_learners:
      - name: "multinomial_lr"
        type: "logistic_regression"
        params:
          max_iter: 2000
          solver: "saga"
          penalty: "l1"
          C: 1.0
          multi_class: "multinomial"
          tol: 0.0001
      
      - name: "xgboost"
        type: "xgboost"
        params:
          n_estimators: 100
          max_depth: 6
          learning_rate: 0.1
          subsample: 0.8
          colsample_bytree: 0.8
          objective: "multi:softprob"
          num_class: 4
          eval_metric: "mlogloss"
          tree_method: "hist"
          grow_policy: "depthwise"
      
      - name: "lightgbm"
        type: "lightgbm"
        params:
          n_estimators: 100
          max_depth: 6
          learning_rate: 0.1
          subsample: 0.8
          colsample_bytree: 0.8
          objective: "multiclass"
          num_class: 4
          metric: "multi_logloss"
          data_sample_strategy: "goss"
          enable_bundle: true
      
      - name: "catboost"
        type: "catboost"
        params:
          iterations: 100
          depth: 6
          learning_rate: 0.1
          loss_function: "MultiClass"
          classes_count: 4
          verbose: false
          grow_policy: "SymmetricTree"
      
      - name: "random_forest"
        type: "random_forest"
        params:
          n_estimators: 100
          max_depth: 10
          min_samples_split: 5
          min_samples_leaf: 2
          max_features: "sqrt"
    
    # 元学习器配置
    meta_learner:
      type: "elastic_net_logistic"
      params:
        penalty: "elasticnet"
        solver: "saga"
        l1_ratio: 0.5
        C: 1.0
        max_iter: 2000
        multi_class: "multinomial"
        tol: 0.0001
    
    # 交叉验证配置
    cv:
      n_splits: 5
      shuffle: false  # 时序交叉验证，不按时间打乱
    
    # 数据划分
    split_ratio:
      train: 0.7
      val: 0.2
      test: 0.1
    
    # 模型保存路径（当前使用 stable 训练产物，文件名与 README 默认一致便于 API/前端加载）
    model_path: "models/stacking_risk_v1.pkl"
    pipeline_path: "models/preprocessing_pipeline.pkl"
  
  # 风险等级映射
  risk_levels:
    - "蓝"
    - "黄"
    - "橙"
    - "红"
  
  # 行业风险基准系数（示例）
  industry_risk_coefficients:
    default: 1.0
    high_risk:
      - "采矿业"
      - "危险化学品"
      - "金属冶炼"
    medium_risk:
      - "制造业"
      - "建筑业"

# Harness 配置
harness:
  # AgentFS 配置
  agentfs:
    db_path: "data/agentfs.db"
    snapshot_interval: 3600  # 秒
    git_repo_path: "data/agentfs_git"
    snapshots_dir: "data/snapshots"
  
  # 记忆系统配置
  memory:
    short_term:
      max_tokens: 180000
      safety_threshold: 0.8  # 80%
      cleanup_strategy: "lru"
      priority_levels:
        P0:
          description: "核心指令/红线，永久保留"
          retention: "permanent"
        P1:
          description: "高优先级，最后清理，摘要存入长期记忆"
          retention: "summary"
        P2:
          description: "中优先级，优先压缩"
          retention: "compress"
        P3:
          description: "低优先级，最先移除"
          retention: "remove"
    
    long_term:
      knowledge_files:
        - "knowledge_base/工矿风险预警智能体合规执行书.md"
        - "knowledge_base/部门分级审核SOP.md"
        - "knowledge_base/工业物理常识及传感器时间序列逻辑.md"
        - "knowledge_base/企业已具备的执行条件.md"
        - "knowledge_base/类似事故处理案例.md"
        - "knowledge_base/预警历史经验与短期记忆摘要.md"
      
      archive_files:
        - "memory/核心指令归档.md"
        - "memory/风险事件归档.md"
        - "memory/处置经验归档.md"
        - "memory/系统日志归档.md"
      
      rag:
        enabled: false  # Docker API 默认关闭 RAG，避免 native embedding 依赖拖垮主服务
        embedding_model: "BAAI/bge-large-zh-v1.5"
        reranker_model: "BAAI/bge-reranker-large"
        top_k_retrieval: 10
        top_k_rerank: 5
        chunk_size: 300
        chunk_overlap: 50
  
  # 三重校验配置
  validation:
    march:
      enabled: true
      check_levels:
        - "合规红线校验"
        - "工矿逻辑校验"
        - "处置可行性校验"
    
    monte_carlo:
      enabled: true
      n_samples: 20
      confidence_threshold: 0.85
      risk_dimensions:
        - name: "后果严重度"
          levels: ["极低", "低", "中", "高", "极高"]
        - name: "利益相关性"
          levels: ["极低", "低", "中", "高", "极高"]
        - name: "不可逆性"
          levels: ["极低", "低", "中", "高", "极高"]
  
  # 模型迭代管控配置
  model_iteration:
    git_flow:
      main_branch: "main"
      dev_branch: "develop"
      feature_branch_prefix: "feature/"
      release_branch_prefix: "release/"
    
    ci:
      enabled: true
      pipeline:
        - "code_lint"
        - "system_load_test"
        - "model_regression_test"
      
      regression:
        min_f1_score: 0.85
        comparison_metric: "f1_macro"
    
    approval:
      levels:
        - role: "安全监管负责人"
          required: true
        - role: "技术管理负责人"
          required: true
      
      trial_period_hours: 24

# API 配置
api:
  host: "0.0.0.0"
  port: 8000
  reload: false
  workers: 1
  docs_url: "/docs"
  openapi_url: "/openapi.json"

# 前端配置
frontend:
  port: 8501
  title: "工矿企业风险预警智能体管控平台"
  page_icon: "🏭"

# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/system.log"
  max_bytes: 10485760  # 10MB
  backup_count: 5

# LLM 配置
llm:
  provider: "glm5"  # 当前启用的 provider；也可用环境变量 LLM_PROVIDER 覆盖
  providers:
    # 任意 OpenAI Chat Completions 兼容模型都可新增一个 provider。
    # api_key_env 指向密钥所在环境变量名，避免把密钥写进配置文件。
    glm5:
      model: "glm-5"
      base_url: "https://open.bigmodel.cn/api/paas/v4/"
      api_key_env: "GLM5_API_KEY"
      default_temperature: 0.3
      default_max_tokens: 8192
      max_retries: 3
    deepseek:
      model: "deepseek-chat"
      base_url: "https://api.deepseek.com"
      api_key_env: "DEEPSEEK_API_KEY"
      default_temperature: 0.3
      default_max_tokens: 8192
      max_retries: 3

# 场景化配置
scenarios:
  chemical:
    name: "危险化学品"
    kb_subdir: "knowledge_base/chemical"
    prompt_template: "prompts/decision_v1_chemical.txt"
    checker_strictness: "strict"
    confidence_threshold: 0.90
    risk_threshold: 2.2
    memory_top_k: 5
  metallurgy:
    name: "冶金"
    kb_subdir: "knowledge_base/metallurgy"
    prompt_template: "prompts/decision_v1_metallurgy.txt"
    checker_strictness: "standard"
    confidence_threshold: 0.85
    risk_threshold: 2.5
    memory_top_k: 5
  dust:
    name: "粉尘涉爆"
    kb_subdir: "knowledge_base/dust"
    prompt_template: "prompts/decision_v1_dust.txt"
    checker_strictness: "standard"
    confidence_threshold: 0.85
    risk_threshold: 2.5
    memory_top_k: 5

# 迭代配置
iteration:
  monitor:
    sample_threshold: 5000
    f1_threshold: 0.85
    db_path: "data/audit.db"
  approvers:
    security: "security@mining-risk.gov.cn"
    tech: "tech@mining-risk.gov.cn"
  canary:
    ratios: [0.0, 0.1, 0.5, 1.0]
  staging:
    duration_hours: 24
    sample_interval_minutes: 5
  smtp:
    host: ""
    port: 587
    use_tls: true
    username: ""
    password: ""
    from: "agent@mining-risk.gov.cn"
  webhook_url: ""

# 审计配置
audit:
  db_path: "data/audit.db"
  retention_days: 365
  auto_archive: true
